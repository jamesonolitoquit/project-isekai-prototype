# Phase 5: Docker Compose Stack for Local Development & Staging
# Full deployment stack: PostgreSQL + Redis + API + Front-end
# Use: docker-compose up -d
# Test: curl http://localhost:5000/api/health

version: '3.8'

services:
  # PostgreSQL Database (v14 for beta)
  postgres:
    image: postgres:14-alpine
    container_name: isekai-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-isekai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-isekai_beta_password}
      POSTGRES_DB: ${DB_NAME:-isekai_beta}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale C.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-isekai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - isekai-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # Redis Cache & Socket.IO Adapter
  redis:
    image: redis:7-alpine
    container_name: isekai-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - isekai-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # Game API Server (Node.js + Express + Socket.IO)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: isekai-api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER:-isekai}:${DB_PASSWORD:-isekai_beta_password}@postgres:5432/${DB_NAME:-isekai_beta}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-in-production}
      SOCKET_IO_PORT: ${SOCKET_IO_PORT:-3002}
      HTTP_PORT: ${HTTP_PORT:-5000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MAX_PLAYERS: ${MAX_PLAYERS:-500}
      ENABLE_CORS: ${ENABLE_CORS:-true}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "5000:5000"
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./src/data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - isekai-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"


  # React Front-end - Run locally with: npm run dev
  # (Keeping Docker config as reference for production)
