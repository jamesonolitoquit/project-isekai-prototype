  #     driver: "json-file"
  #     options:
  #       max-size: "100m"
  #       max-file: "5"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  isekai-network:
    driver: bridge

# Quick Reference:
# Start stack:  docker-compose up -d
# View logs:    docker-compose logs -f api
# Test health:  curl http://localhost:5000/api/health
# Stop stack:   docker-compose down
# Full cleanup: docker-compose down -v (removes volumes)
