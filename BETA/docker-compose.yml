  #     NODE_ENV: ${NODE_ENV:-development}
  #     REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000}
  #     REACT_APP_SOCKET_IO_URL: ${REACT_APP_SOCKET_IO_URL:-http://localhost:3002}
  #   ports:
  #     - "3000:3000"
  #   depends_on:
