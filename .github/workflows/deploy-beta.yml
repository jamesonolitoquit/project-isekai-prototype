name: Deploy Beta - Phase 5

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY_PREFIX: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_NAME: isekai

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd PROTOTYPE
          npm ci

      - name: Run unit tests
        run: |
          cd PROTOTYPE
          npm test -- m69m70 --passWithNoTests --coverage 2>&1 | tee test-results.log

      - name: TypeScript type check
        run: |
          cd PROTOTYPE
          npx tsc --noEmit --skipLibCheck

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: PROTOTYPE/test-results.log

  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: test
    
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}
      image_digest: ${{ steps.image.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: image
        run: |
          TAG="${GITHUB_SHA::7}-$(date +%s)"
          DIGEST=$(echo "${{ steps.login-ecr.outputs.registry }}" | cut -d'/' -f1)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "full_image=${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:$TAG" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          cd PROTOTYPE
          docker build \
            --tag ${{ steps.image.outputs.full_image }} \
            --tag ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:latest \
            --label "commit=${{ github.sha }}" \
            --label "author=${{ github.actor }}" \
            .
          docker images | head -5

      - name: Scan image for vulnerabilities
        run: |
          docker scan ${{ steps.image.outputs.full_image }} || true

      - name: Push to ECR
        run: |
          docker push ${{ steps.image.outputs.full_image }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:latest
          echo "Image pushed: ${{ steps.image.outputs.full_image }}"

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster isekai-beta \
            --service isekai-api \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }} \
            || echo "ECS cluster/service not yet created"

      - name: Wait for service to stabilize
        run: |
          echo "Waiting 30 seconds for ECS to process deployment..."
          sleep 30

      - name: Check service status
        run: |
          STATUS=$(aws ecs describe-services \
            --cluster isekai-beta \
            --services isekai-api \
            --region ${{ env.AWS_REGION }} \
            --query 'services[0].status' \
            --output text 2>/dev/null || echo "CLUSTER_NOT_FOUND")
          
          if [ "$STATUS" != "CLUSTER_NOT_FOUND" ]; then
            echo "Service status: $STATUS"
          else
            echo "⚠️  ECS cluster not yet provisioned - Terraform infrastructure needs to be applied first"
          fi

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [test, build-and-push, deploy]
    if: always()

    steps:
      - name: Notify Slack (Success)
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: |
            ✅ Beta Deployment Success
            • Commit: ${{ github.sha }}
            • Build: ${{ needs.build-and-push.outputs.image_tag }}
            • Author: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          fields: repo,message,commit,author

      - name: Notify Slack (Failure)
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            ❌ Beta Deployment Failed
            • Commit: ${{ github.sha }}
            • Author: ${{ github.actor }}
            • Check actions: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          fields: repo,message,commit,author

      - name: Create GitHub deployment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'beta',
              description: 'Deployment ${{ needs.build-and-push.outputs.image_tag }}',
              auto_merge: false,
              required_contexts: ['test']
            });
